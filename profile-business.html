<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#15a36b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="FundHuntr" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="apple-touch-icon" href="icon-192.svg" />
  <title>Business profile · FundHuntr</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <nav class="nav">
    <a href="index.html" style="display:flex; align-items:center; color:inherit; text-decoration:none;" class="brand">
      <div class="brand-mark"><span>Fund</span><span>Huntr</span></div>
    </a>
    <div class="nav-links">
      <a class="nav-link hide-mobile" href="index.html">Switch type</a>
      <a class="nav-link" href="discover.html">Skip →</a>
    </div>
  </nav>

  <main class="container-narrow">
    <div class="wizard-shell">
      <div class="wizard-header">
        <div class="wizard-title">
          <div class="profile-icon" data-icon="rocket" style="background: linear-gradient(135deg, #0f7a4e, #15a36b);"></div>
          <div>
            <h2>For-profit business profile</h2>
            <p>The richer your answers, the better the auto-apply.</p>
          </div>
        </div>
      </div>

      <div class="progress-track"><div class="progress-fill" data-progress-fill></div></div>
      <div class="progress-meta">
        <span data-step-label>Step 1</span>
        <span data-progress-label>Step 1 of 7</span>
      </div>

      <div class="wizard-body" data-wizard-body></div>

      <div class="wizard-footer">
        <button class="btn btn-ghost" data-back>← Back</button>
        <button class="btn btn-primary" data-next>Next →</button>
      </div>
    </div>
  </main>

  <script src="app.js"></script>
  <script src="icons.js"></script>
  <script>
    const COUNTRIES = [
      'Argentina', 'Australia', 'Austria', 'Bangladesh', 'Belgium', 'Brazil', 'Cameroon',
      'Canada', 'Chile', 'China', 'Colombia', 'Czech Republic', 'Denmark', 'Egypt',
      'Ethiopia', 'Finland', 'France', 'Germany', 'Ghana', 'Greece', 'Hungary', 'India',
      'Indonesia', 'Iran', 'Ireland', 'Israel', 'Italy', 'Japan', 'Jordan', 'Kenya',
      'Lebanon', 'Malaysia', 'Mexico', 'Morocco', 'Netherlands', 'New Zealand', 'Nigeria',
      'Norway', 'Pakistan', 'Peru', 'Philippines', 'Poland', 'Portugal', 'Qatar',
      'Romania', 'Saudi Arabia', 'Singapore', 'South Africa', 'South Korea', 'Spain',
      'Sweden', 'Switzerland', 'Tanzania', 'Thailand', 'Tunisia', 'Turkey', 'UAE',
      'Uganda', 'United Kingdom', 'United States', 'Vietnam', 'Other'
    ];

    const businessSchema = {
      steps: [
        {
          title: 'Founder details',
          subtitle: 'Many funders score by founder demographics.',
          fields: [
            { name: 'firstName', label: 'First name', type: 'text', required: true },
            { name: 'lastName', label: 'Last name', type: 'text', required: true },
            { name: 'role', label: 'Your role', type: 'select',
              options: ['Founder / CEO', 'Co-founder', 'Owner', 'Managing partner / Director', 'CFO', 'COO', 'Other executive'] },
            { name: 'email', label: 'Work email', type: 'email', required: true },
            { name: 'phone', label: 'Phone (with country code)', type: 'tel' },
            { name: 'linkedin', label: 'LinkedIn URL', type: 'url' },
            { name: 'founderEthnicity', label: 'Founder race / ethnicity / heritage', type: 'chips-multi', full: true,
              options: ['African / Black', 'Arab', 'Asian — East', 'Asian — South', 'Asian — Southeast', 'Caribbean', 'Hispanic / Latino', 'Indigenous / First Nations', 'Middle Eastern', 'Pacific Islander', 'Roma', 'White / European', 'Multiracial', 'Prefer not to say'] },
            { name: 'founderGender', label: 'Founder gender', type: 'select',
              options: ['Woman', 'Man', 'Non-binary', 'Prefer not to say'] },
            { name: 'veteran', label: 'Veteran / ex-service founder?', type: 'select',
              options: ['Yes', 'No', 'Service-disabled veteran'] },
            { name: 'lgbtqOwned', label: 'LGBTQ+-owned?', type: 'select',
              options: ['Yes', 'No', 'Prefer not to say'] },
            { name: 'disabilityOwned', label: 'Disability-owned?', type: 'select',
              options: ['Yes', 'No', 'Prefer not to say'] },
            { name: 'immigrantFounder', label: 'Immigrant / diaspora founder?', type: 'select',
              options: ['Yes — first generation', 'Yes — second generation', 'No', 'Prefer not to say'] },
            { name: 'youthFounder', label: 'Youth-led (under 30)?', type: 'select',
              options: ['Yes', 'No'] },
          ]
        },
        {
          title: 'Business basics',
          subtitle: 'Identity, structure, and stage.',
          fields: [
            { name: 'businessName', label: 'Legal business name', type: 'text', required: true, full: true },
            { name: 'dba', label: 'DBA / brand name', type: 'text' },
            { name: 'website', label: 'Website', type: 'url' },
            { name: 'foundedDate', label: 'Founded date', type: 'date' },
            { name: 'businessStructure', label: 'Business structure', type: 'select',
              options: ['Sole proprietor / sole trader', 'Partnership', 'LLC / Ltd', 'Corporation / Inc / SA', 'B-Corp / B-Lab certified', 'Cooperative', 'Social enterprise / CIC', 'Other'] },
            { name: 'taxId', label: 'Tax ID / Business registration number', type: 'text', placeholder: 'e.g. EIN, ABN, Companies House #, RUC, CNPJ' },
            { name: 'industryCode', label: 'Industry classification code (if known)', type: 'text', placeholder: 'NAICS / SIC / NACE / ISIC' },
            { name: 'stage', label: 'Business stage', type: 'chips', full: true,
              options: ['Idea / pre-formation', 'Pre-revenue', 'Early revenue', 'Growth', 'Established', 'Mature / scaling'] },
            { name: 'industry', label: 'Industry', type: 'select', full: true,
              options: ['Software / SaaS', 'AI / ML', 'Biotech / Life sciences', 'Healthcare / MedTech', 'Climate / Cleantech', 'Manufacturing', 'Consumer goods', 'Food / Beverage', 'Retail / E-commerce', 'Agriculture / AgTech', 'Energy', 'Construction', 'Education / EdTech', 'FinTech', 'Real estate / PropTech', 'Media / Creative', 'Hospitality / Tourism', 'Logistics / Mobility', 'Fashion / Textiles', 'Other'] },
            { name: 'subSector', label: 'Sub-sector / niche', type: 'text', placeholder: 'e.g. precision agriculture sensors' },
          ]
        },
        {
          title: 'Location & footprint',
          subtitle: 'Geography is decisive in grant eligibility.',
          fields: [
            { name: 'hqCountry', label: 'HQ country', type: 'select', required: true, options: COUNTRIES },
            { name: 'hqCity', label: 'HQ city', type: 'text' },
            { name: 'hqRegion', label: 'HQ state / region / province', type: 'text' },
            { name: 'incorporated', label: 'Country / state of incorporation', type: 'text' },
            { name: 'ruralUrban', label: 'Service area type', type: 'select',
              options: ['Urban', 'Suburban', 'Rural', 'Remote / online', 'Mix'] },
            { name: 'specialZone', label: 'Located in a special zone?', type: 'select',
              hint: 'e.g. Opportunity Zone (US), Enterprise Zone (UK), SEZ (India / Africa), free trade zone',
              options: ['No / unsure', 'Opportunity / Enterprise Zone', 'Special Economic Zone', 'Free trade zone', 'Indigenous / tribal land', 'Underserved community designation'] },
            { name: 'serviceGeography', label: 'Where do you serve customers?', type: 'chips-multi', full: true,
              options: ['Local city / region', 'National', 'North America', 'Latin America', 'EU', 'UK / Ireland', 'MENA', 'Sub-Saharan Africa', 'South Asia', 'East Asia', 'Southeast Asia', 'Oceania', 'Global'] },
          ]
        },
        {
          title: 'Team & size',
          subtitle: 'Many grants cap by employee count or revenue.',
          fields: [
            { name: 'employees', label: 'Total employees (incl. founders)', type: 'number' },
            { name: 'fullTime', label: 'Full-time staff', type: 'number' },
            { name: 'partTime', label: 'Part-time / contractors', type: 'number' },
            { name: 'leadershipDiversity', label: 'Leadership team diversity', type: 'chips-multi', full: true,
              options: ['Women in leadership', 'BIPOC / underrepresented in leadership', 'LGBTQ+ in leadership', 'Veterans in leadership', 'Persons with disabilities in leadership', 'Mostly homogenous'] },
            { name: 'plansToHire', label: 'Plans to hire in next 12 months?', type: 'select',
              options: ['Yes — 1-3 hires', 'Yes — 4-10 hires', 'Yes — 10+ hires', 'No', 'Unsure'] },
          ]
        },
        {
          title: 'Financials',
          subtitle: 'Revenue, runway, and prior funding shape eligibility.',
          fields: [
            { name: 'currency', label: 'Reporting currency', type: 'select',
              options: ['USD ($)', 'EUR (€)', 'GBP (£)', 'INR (₹)', 'NGN (₦)', 'ZAR (R)', 'KES (KSh)', 'AUD (A$)', 'CAD (C$)', 'BRL (R$)', 'JPY (¥)', 'CNY (¥)', 'MXN ($)', 'PHP (₱)', 'IDR (Rp)', 'EGP (E£)', 'AED (د.إ)', 'CHF', 'SEK', 'NOK', 'Other'] },
            { name: 'revenueLastYear', label: 'Revenue (last 12 mo)', type: 'select',
              options: ['Pre-revenue', 'Under $50k', '$50k–$250k', '$250k–$1M', '$1M–$5M', '$5M–$25M', '$25M+'] },
            { name: 'profitable', label: 'Profitable?', type: 'select',
              options: ['Yes', 'Break-even', 'Not yet', 'Prefer not to say'] },
            { name: 'fundingRaised', label: 'Total funding raised to date', type: 'number', placeholder: '0' },
            { name: 'lastRound', label: 'Most recent round', type: 'select',
              options: ['None / bootstrapped', 'Friends & family', 'Pre-seed', 'Seed', 'Series A', 'Series B+', 'Debt', 'Crowdfunding', 'Other'] },
            { name: 'runway', label: 'Current runway (months)', type: 'number', placeholder: '9' },
            { name: 'businessCertifications', label: 'Business certifications held', type: 'chips-multi', full: true,
              hint: 'e.g. SBA 8(a)/WOSB/SDVOSB (US), B Corp, MWBE, ISO, social enterprise mark',
              options: ['B Corp certified', 'Women-owned (formal cert)', 'Minority-owned (formal cert)', 'Veteran-owned (formal cert)', 'LGBTQ+ supplier (NGLCC etc.)', 'Disability supplier', 'Social Enterprise mark', 'ISO certified', 'Fair Trade', 'In progress', 'None'] },
          ]
        },
        {
          title: 'Mission & innovation',
          subtitle: 'What makes you fundable.',
          fields: [
            { name: 'oneLiner', label: 'One-line description', type: 'text', full: true,
              placeholder: 'AI-powered triage tool for rural emergency rooms.' },
            { name: 'problemSolved', label: 'Problem you\'re solving', type: 'textarea', full: true, rows: 3 },
            { name: 'mission', label: 'Mission statement', type: 'textarea', full: true, rows: 3 },
            { name: 'targetCustomer', label: 'Target customer', type: 'text', full: true,
              placeholder: 'e.g. Hospitals with <100 beds in low-income regions' },
            { name: 'tractionMetrics', label: 'Key traction metrics', type: 'textarea', full: true,
              placeholder: 'MRR, users, contracts, pilots, LOIs…' },
            { name: 'ipStatus', label: 'IP / patents', type: 'select',
              options: ['No IP', 'Trademarks filed', 'Patents pending', 'Granted patents', 'Trade secrets'] },
            { name: 'innovationFocus', label: 'Innovation focus areas', type: 'chips-multi', full: true,
              options: ['AI / ML', 'Climate', 'Health equity', 'Accessibility', 'Sustainability / Circular economy', 'Education', 'Financial inclusion', 'Manufacturing', 'Defense / dual-use', 'Quantum', 'Biotech', 'Robotics', 'Space', 'Agritech'] },
          ]
        },
        {
          title: 'What you need',
          subtitle: 'Tells FundHuntr which programs to surface and apply to.',
          fields: [
            { name: 'fundingNeeded', label: 'Amount needed', type: 'number', placeholder: '250000', hint: 'In your selected currency.' },
            { name: 'useOfFunds', label: 'Use of funds', type: 'chips-multi', full: true,
              options: ['Hiring', 'R&D', 'Marketing', 'Equipment / capex', 'Inventory', 'Working capital', 'Real estate', 'Software / IT', 'Training', 'Pilot programs', 'International expansion', 'Sustainability / energy efficiency'] },
            { name: 'fundingTypes', label: 'Open to which funding types?', type: 'chips-multi', full: true,
              options: ['Non-dilutive grants', 'Pitch competitions', 'Innovation / R&D programs (e.g. SBIR, Innovate UK, Horizon Europe)', 'State / local / regional grants', 'Tax credits & R&D incentives', 'Forgivable loans', 'Convertible notes', 'Equity rounds', 'Revenue-based finance', 'Crowdfunding', 'Microfinance / development bank'] },
            { name: 'autoApply', label: 'Enable auto-apply?', type: 'chips', full: true,
              options: ['Yes — apply automatically when match >85%', 'Yes — but ask me to review first', 'Draft only — I\'ll submit', 'No — just show me matches'] },
            { name: 'urgency', label: 'How urgent?', type: 'select',
              options: ['ASAP — within 30 days', 'Next 3 months', 'Next 6 months', 'Within the year'] },
            { name: 'pitchDeckUrl', label: 'Pitch deck link (optional)', type: 'url', full: true },
          ]
        }
      ]
    };

    document.addEventListener('DOMContentLoaded', () => {
      FH.initWizard({ type: 'business', schema: businessSchema });
      FH.renderBottomNav('profile');
    });
  </script>
</body>
</html>
