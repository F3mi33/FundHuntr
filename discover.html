<body>
  <nav class="nav">

  <main class="discover-shell">
    <h2 id="greeting">Your matches</h2>
    <p class="sub" id="profile-line">Build a profile to personalize this feed.</p>

    <div class="deck" id="deck"></div>

    <div class="swipe-actions">
      <div class="swipe-action info" data-icon="info" id="btn-info" title="View details"></div>
      <div class="swipe-action nope" data-icon="close" id="btn-nope" title="Pass"></div>
      <div class="swipe-action like" data-icon="heart-fill" id="btn-like" title="Save & queue for auto-apply"></div>
      <div class="swipe-action star" data-icon="star" id="btn-star" title="Apply now (priority)"></div>
    </div>

    <div class="matches-bar">
      <span class="matches-count" id="saved-count">0</span>
      <div>
        <strong>Queued for auto-apply</strong>
        <small style="display:block;">Swipe right or tap the heart — applications get drafted and submitted automatically.</small>
      </div>
    </div>
  </main>

      { id: 'n9', audience: ['charity', 'nonprofit'], country: 'Global', title: 'Global Innovation Fund', org: 'GIF',

    /* ---- Filter by profile ----------------------------------------------------- */
    const profile = FH.loadProfile();
    const profileType = profile?.type || null;

    function matchesProfile(o) {
      if (!profileType) return true;
      return o.audience.includes(profileType);
    }
    let deckData = OPPORTUNITIES.filter(matchesProfile)
      .filter(o => !FH.loadList(FH.PASSED_KEY).includes(o.id))
      .filter(o => !FH.loadList(FH.SAVED_KEY).find(s => s.id === o.id))
      .sort((a, b) => b.match - a.match);

    const greeting = document.getElementById('greeting');
    const profLine = document.getElementById('profile-line');
    if (profileType) {
      const labels = { student: 'student', business: 'business', charity: 'charity', nonprofit: 'non-profit' };
      const data = profile.data || {};
      const name = data.firstName || data.orgName || data.businessName || 'there';
      greeting.textContent = `Hi ${name}`;
      profLine.textContent = `${deckData.length} live ${labels[profileType]} opportunities globally — ranked by match score. Swipe right and FundHuntr auto-applies.`;
    } else {
      greeting.textContent = 'Live demo feed';
      profLine.textContent = 'Build a profile to personalize. Sample opportunities shown below.';
    }

    /* ---- Render deck ----------------------------------------------------------- */
    const deckEl = document.getElementById('deck');
    const savedCountEl = document.getElementById('saved-count');
    const saved = FH.loadList(FH.SAVED_KEY);
    savedCountEl.textContent = saved.length;
    const TOP = 3;

    function buildCard(o, depth) {
      const card = document.createElement('div');
      card.className = 'swipe-card';
      card.dataset.id = o.id;
      card.style.zIndex = 100 - depth;
      const scale = 1 - (depth * 0.04);
      const ty = depth * 10;
      card.style.transform = `translateY(${ty}px) scale(${scale})`;
      card.style.opacity = depth >= TOP ? 0 : 1;

      card.innerHTML = `
        <div class="banner ${o.banner || ''}">
          <div class="banner-icon">${FH.icon(o.icon || 'globe')}</div>
          <span class="banner-tag">${FH.escapeHtml(o.type)}</span>
        </div>
        <div class="body">
          <span class="match">${o.match}% match</span>
          <h3 class="title">${FH.escapeHtml(o.title)}</h3>
          <p class="org">${FH.escapeHtml(o.org)}</p>
          <div class="amount">${FH.escapeHtml(o.amount)}</div>
          <div class="meta">
            <div><div class="k">Deadline</div><div class="v">${FH.escapeHtml(o.deadline)}</div></div>
            <div><div class="k">Region</div><div class="v">${FH.escapeHtml(o.country)}</div></div>
          </div>
          <p class="desc">${FH.escapeHtml(o.desc)}</p>
          <div class="chip-group">
            ${(o.tags||[]).map(t => `<span class="chip" style="cursor:default;">${FH.escapeHtml(t)}</span>`).join('')}
          </div>
        </div>
        <div class="stamp like">APPLY</div>
        <div class="stamp nope">SKIP</div>
      `;
      return card;
    }

    function renderDeck() {
      deckEl.innerHTML = '';
      if (deckData.length === 0) {
        deckEl.innerHTML = `<div class="empty-deck">
          <h3>You're caught up.</h3>
          <p>FundHuntr is monitoring new global opportunities daily. Check <a href="saved.html">saved matches</a> or come back soon.</p>
        </div>`;
        return;
      }
      deckData.slice(0, TOP + 1).forEach((o, i) => deckEl.appendChild(buildCard(o, i)));
      attachDragToTop();
    }

    function topCard() { return deckEl.querySelector('.swipe-card'); }

    function attachDragToTop() {
      const card = topCard();
      if (!card) return;
      let startX = 0, startY = 0, dx = 0, dy = 0, dragging = false;
      const stampLike = card.querySelector('.stamp.like');
      const stampNope = card.querySelector('.stamp.nope');
      const body = card.querySelector('.body');

      function onStart(e) {
        if (e.target.closest && e.target.closest('.body')) {
          if (body.scrollHeight > body.clientHeight) return;
        }
        dragging = true;
        startX = (e.touches?.[0] || e).clientX;
        startY = (e.touches?.[0] || e).clientY;
        card.classList.add('dragging');
      }
      function onMove(e) {
        if (!dragging) return;
        const x = (e.touches?.[0] || e).clientX;
        const y = (e.touches?.[0] || e).clientY;
        dx = x - startX;
        dy = y - startY;
        if (Math.abs(dx) > 8) e.preventDefault?.();
        const rot = dx * 0.06;
        card.style.transform = `translate(${dx}px, ${dy}px) rotate(${rot}deg)`;
        stampLike.style.opacity = Math.max(0, Math.min(1, dx / 80));
        stampNope.style.opacity = Math.max(0, Math.min(1, -dx / 80));
      }
      function onEnd() {
        if (!dragging) return;
        dragging = false;
        card.classList.remove('dragging');
        const threshold = 100;
        if (dx > threshold) flyOff('like');
        else if (dx < -threshold) flyOff('nope');
        else {
          card.style.transform = '';
          stampLike.style.opacity = 0;
          stampNope.style.opacity = 0;
        }
      }

      card.addEventListener('mousedown', onStart);
      window.addEventListener('mousemove', onMove);
      window.addEventListener('mouseup', onEnd);
      card.addEventListener('touchstart', onStart, { passive: true });
      window.addEventListener('touchmove', onMove, { passive: false });
      window.addEventListener('touchend', onEnd);
    }

    function flyOff(direction, priority = false) {
      const card = topCard();
      if (!card) return;
      const id = card.dataset.id;
      const opp = OPPORTUNITIES.find(o => o.id === id);
      const x = direction === 'like' ? window.innerWidth : -window.innerWidth;
      card.style.transition = 'transform 0.45s ease, opacity 0.45s ease';
      card.style.transform = `translate(${x}px, 60px) rotate(${direction === 'like' ? 25 : -25}deg)`;
      card.style.opacity = 0;

      if (direction === 'like') {
        const list = FH.loadList(FH.SAVED_KEY);
        if (!list.find(s => s.id === id)) {
          list.push({ ...opp, savedAt: new Date().toISOString(), priority, status: 'queued' });
          FH.saveList(FH.SAVED_KEY, list);
        }
        savedCountEl.textContent = list.length;
      } else {
        const list = FH.loadList(FH.PASSED_KEY);
        if (!list.includes(id)) list.push(id);
        FH.saveList(FH.PASSED_KEY, list);
      }

      setTimeout(() => {
        deckData = deckData.filter(o => o.id !== id);
        renderDeck();
      }, 380);
    }

    document.getElementById('btn-like').addEventListener('click', () => flyOff('like'));
    document.getElementById('btn-nope').addEventListener('click', () => flyOff('nope'));
    document.getElementById('btn-star').addEventListener('click', () => flyOff('like', true));
    document.getElementById('btn-info').addEventListener('click', () => {
      const card = topCard();
      if (!card) return;
      const body = card.querySelector('.body');
      body.scrollTo({ top: body.scrollHeight, behavior: 'smooth' });
    });

    document.querySelector('[data-edit-profile]').addEventListener('click', (e) => {
      e.preventDefault();
      if (!profileType) { window.location.href = 'index.html'; return; }
      window.location.href = 'profile-' + profileType + '.html';
    });

    renderDeck();
    FH.renderBottomNav('discover');
  </script>
