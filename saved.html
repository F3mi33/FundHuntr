<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#15a36b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="FundHuntr" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="apple-touch-icon" href="icon-192.svg" />
  <title>Saved · FundHuntr</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <nav class="nav">
    <a href="index.html" class="brand-wordmark">FundHuntr</a>
    <div class="nav-links">
      <a class="nav-link" href="discover.html">Discover</a>
    </div>
  </nav>

  <main class="container-narrow">
    <h2 style="margin-bottom:6px; letter-spacing:-0.02em;">Queued for auto-apply</h2>
    <p style="color:var(--color-text-soft); margin-top:0;">
      Answers get drafted, forms get filled, applications get submitted &mdash; automatically. You'll be notified to review high-value items.
    </p>

    <div id="empty" class="callout" style="display:none;">
      Nothing saved yet. <a href="discover.html">Discover opportunities</a> and swipe right to queue them up.
    </div>

    <div class="saved-list" id="saved-list"></div>
  </main>

  <script src="app.js"></script>
  <script src="mobile.js"></script>
  <script src="icons.js"></script>
  <script>
    const list = FH.loadList(FH.SAVED_KEY);
    const container = document.getElementById('saved-list');
    const empty = document.getElementById('empty');

    if (list.length === 0) {
      empty.style.display = 'block';
    }

    list.forEach((o, idx) => {
      const card = document.createElement('div');
      card.className = 'saved-card' + (o.priority ? ' priority' : '');
      const status = o.status || 'queued';
      const statusLabel = status === 'submitted' ? 'Submitted' : status === 'drafted' ? 'Auto-drafted' : 'Queued';
      card.innerHTML = `
        <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:8px;">
          <div>
            <h4>${FH.escapeHtml(o.title)}</h4>
            <div class="org">${FH.escapeHtml(o.org)} · ${FH.escapeHtml(o.country || 'Global')}</div>
          </div>
          <div style="text-align:right;">
            <div class="amount">${FH.escapeHtml(o.amount)}</div>
          </div>
        </div>
        <div class="deadline">Deadline: ${FH.escapeHtml(o.deadline)}</div>
        <div style="display:flex; gap:6px; flex-wrap:wrap;">
          <span class="chip ${o.priority ? 'active' : ''}" style="cursor:default; padding:5px 10px; font-size:11px;">
            ${o.priority ? 'Priority' : statusLabel}
          </span>
          <span class="chip" style="cursor:default; padding:5px 10px; font-size:11px;">${FH.escapeHtml(o.type)}</span>
        </div>
        <div class="actions">
          <button class="btn btn-primary" data-apply="${idx}">Auto-apply →</button>
          <button class="btn btn-secondary" data-remove="${idx}">Remove</button>
        </div>
      `;
      container.appendChild(card);
    });

    container.addEventListener('click', (e) => {
      const removeIdx = e.target.closest('[data-remove]')?.dataset.remove;
      const applyIdx = e.target.closest('[data-apply]')?.dataset.apply;
      if (removeIdx != null) {
        const arr = FH.loadList(FH.SAVED_KEY);
        arr.splice(parseInt(removeIdx, 10), 1);
        FH.saveList(FH.SAVED_KEY, arr);
        location.reload();
      } else if (applyIdx != null) {
        alert('Auto-apply queued. (Demo: in production this would launch the auto-apply flow.)');
      }
    });

    FH.renderBottomNav('saved');
  </script>
</body>
</html>
